<script>
/* ---------- Tweakable defaults ---------- */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "primaryHue": 260,
  "primaryLightness": 17,
  "accentEnabled": true,
  "particleDensity": 200,
  "fontStyle": "serif",
  "colorMode": "dark",
  "heroScale": 1.15,
  "heroOffsetX": -4
}/*EDITMODE-END*/;
window.__TWEAKS__ = TWEAKS;

<style>
  :root {
    --hue: 245;
    --bg-0: oklch(0.10 0.04 var(--hue));
    --bg-1: oklch(0.15 0.05 var(--hue));
    --bg-2: oklch(0.22 0.06 var(--hue));
    --fg-0: oklch(0.98 0.005 var(--hue));
    --fg-1: oklch(0.85 0.015 var(--hue));
    --fg-2: oklch(0.62 0.02 var(--hue));
    --fg-3: oklch(0.45 0.02 var(--hue));
    --ice: oklch(0.82 0.08 230);
    --ice-soft: oklch(0.72 0.06 230);
    --gold: oklch(0.82 0.12 80);
    --gold-soft: oklch(0.72 0.10 80);
    --line: oklch(1 0 0 / 0.08);
    --line-strong: oklch(1 0 0 / 0.18);
    --glass: oklch(1 0 0 / 0.04);
    --glass-strong: oklch(1 0 0 / 0.08);

    --font-serif: "Cormorant Garamond", "Garamond", Georgia, serif;
    --font-sans: "Inter", -apple-system, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    --font-display: var(--font-serif);
  }

  [data-mode="light"] {
    --bg-0: oklch(0.97 0.01 var(--hue));
    --bg-1: oklch(0.94 0.015 var(--hue));
    --bg-2: oklch(0.88 0.02 var(--hue));
    --fg-0: oklch(0.18 0.04 var(--hue));
    --fg-1: oklch(0.30 0.03 var(--hue));
    --fg-2: oklch(0.45 0.02 var(--hue));
    --fg-3: oklch(0.60 0.02 var(--hue));
    --line: oklch(0 0 0 / 0.10);
    --line-strong: oklch(0 0 0 / 0.20);
    --glass: oklch(1 0 0 / 0.6);
    --glass-strong: oklch(1 0 0 / 0.8);
  }

  [data-font="sans"] {
    --font-display: var(--font-sans);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--fg-0); font-family: var(--font-sans); }
  html { scroll-behavior: smooth; }
  body { overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; }

  /* ---------- Global background: night sky + aurora glow ---------- */
  .sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 1200px 700px at 50% 30%, oklch(0.35 0.10 var(--hue) / 0.4), transparent 60%),
      radial-gradient(ellipse 800px 500px at 20% 70%, oklch(0.30 0.08 220 / 0.25), transparent 60%),
      radial-gradient(ellipse 900px 600px at 85% 20%, oklch(0.30 0.10 280 / 0.3), transparent 65%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-0) 100%);
    transition: background .6s;
  }
  [data-mode="light"] .sky {
    background:
      radial-gradient(ellipse 1200px 700px at 50% 30%, oklch(0.88 0.06 230 / 0.5), transparent 60%),
      radial-gradient(ellipse 900px 600px at 85% 20%, oklch(0.90 0.05 80 / 0.35), transparent 65%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
  }
  .sky::after {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, oklch(1 0 0 / 0.4) 0.5px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.3;
    mix-blend-mode: screen;
  }
  [data-mode="light"] .sky::after { display: none; }

  /* particles */
  #particles {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }

  /* ---------- Fixed hero figure (parallax) ---------- */
  .hero-figure {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
    width: min(62vh, 50vw);
    aspect-ratio: 738/928;
    transition: opacity .4s, transform .6s;
  }
  .hero-figure .glow {
    position: absolute;
    inset: -15%;
    background: radial-gradient(circle at 50% 45%, oklch(0.95 0.10 230 / 0.35), transparent 55%);
    filter: blur(30px);
  }
  .hero-figure .gold-glow {
    position: absolute;
    inset: 10% -10% -10% -10%;
    background: radial-gradient(ellipse at 50% 60%, oklch(0.85 0.14 80 / 0.25), transparent 50%);
    filter: blur(40px);
    opacity: var(--accent-opacity, 1);
  }
  .hero-figure .img-wrap {
    position: absolute; inset: 0;
    background-image: url("assets/skater-hero.jpg");
    background-size: cover;
    background-position: center;
    filter: contrast(1.03) saturate(1.03) brightness(1.02);
    -webkit-mask-image: radial-gradient(ellipse 72% 80% at 50% 50%, black 0%, rgba(0,0,0,0.98) 25%, rgba(0,0,0,0.85) 42%, rgba(0,0,0,0.55) 58%, rgba(0,0,0,0.25) 72%, rgba(0,0,0,0.08) 85%, transparent 100%);
            mask-image: radial-gradient(ellipse 72% 80% at 50% 50%, black 0%, rgba(0,0,0,0.98) 25%, rgba(0,0,0,0.85) 42%, rgba(0,0,0,0.55) 58%, rgba(0,0,0,0.25) 72%, rgba(0,0,0,0.08) 85%, transparent 100%);
  }
  .hero-figure .img-wrap::before {
    content: "";
    position: absolute; inset: -14%;
    background-image: url("assets/skater-hero.jpg");
    background-size: cover;
    background-position: center;
    filter: blur(42px) brightness(0.85) saturate(0.85);
    opacity: 0.45;
    -webkit-mask-image: radial-gradient(ellipse 65% 75% at 50% 50%, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.25) 65%, transparent 95%);
            mask-image: radial-gradient(ellipse 65% 75% at 50% 50%, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.25) 65%, transparent 95%);
    z-index: -1;
  }
  .hero-figure .img-wrap::after {
    content: "";
    position: absolute; inset: -2%;
    background:
      radial-gradient(ellipse 80% 85% at 50% 50%, transparent 45%, var(--bg-0) 92%),
      linear-gradient(180deg, transparent 60%, var(--bg-0) 100%);
    pointer-events: none;
  }
  .hero-figure .sparkle {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 30% 45%, oklch(1 0 0 / 0.9) 0.5px, transparent 2px),
      radial-gradient(circle at 70% 55%, oklch(0.9 0.12 80 / 0.8) 0.5px, transparent 2px),
      radial-gradient(circle at 20% 30%, oklch(1 0 0) 0.5px, transparent 1.5px),
      radial-gradient(circle at 80% 70%, oklch(1 0 0 / 0.7) 0.5px, transparent 2px);
    background-size: 180px 180px, 140px 140px, 90px 90px, 200px 200px;
    animation: sparkle 8s linear infinite;
    mix-blend-mode: screen;
    opacity: 0.7;
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }

  /* ---------- Top navigation ---------- */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 22px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, oklch(0.08 0.04 var(--hue) / 0.7), transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  [data-mode="light"] .nav {
    background: linear-gradient(180deg, oklch(1 0 0 / 0.7), transparent);
  }
  .brand {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
    display: flex; align-items: baseline; gap: 8px;
  }
  .brand .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 0 12px var(--gold);
  }
  .brand em { font-style: italic; color: var(--fg-2); font-weight: 300; font-size: 13px; margin-left: 4px; letter-spacing: 0.15em; text-transform: uppercase; font-family: var(--font-sans); }

  .nav-links {
    display: flex; gap: 4px; align-items: center;
    font-family: var(--font-sans);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .nav-links button {
    background: none; border: none;
    color: var(--fg-1);
    padding: 10px 18px;
    cursor: pointer;
    border-radius: 2px;
    transition: color .2s, background .2s;
    position: relative;
  }
  .nav-links button:hover { color: var(--fg-0); }
  .nav-links button.active { color: var(--fg-0); }
  .nav-links button.active::after {
    content: ""; position: absolute;
    left: 18px; right: 18px; bottom: 4px;
    height: 1px; background: var(--gold);
  }

  /* ---------- Page routing ---------- */
  .page { position: relative; z-index: 3; }
  .page.hidden { display: none; }

  /* ---------- Home: Hero ---------- */
  .hero-section {
    position: relative;
    min-height: 100vh;
    padding: 180px 40px 120px;
    display: flex;
    align-items: center;
  }
  .hero-text {
    position: relative;
    z-index: 4;
    max-width: 520px;
    margin-left: 5vw;
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-eyebrow::before {
    content: ""; width: 28px; height: 1px; background: var(--gold);
  }
  .hero-title {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: clamp(48px, 7vw, 96px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin: 0 0 28px;
    color: var(--fg-0);
  }
  .hero-title em {
    font-style: italic;
    font-weight: 300;
    color: var(--ice);
  }
  .hero-sub {
    font-size: 17px;
    line-height: 1.6;
    color: var(--fg-1);
    font-weight: 300;
    margin-bottom: 40px;
    max-width: 440px;
  }
  .hero-cta {
    display: flex; gap: 16px; align-items: center;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 28px;
    border: 1px solid var(--line-strong);
    background: var(--glass);
    color: var(--fg-0);
    font-family: var(--font-sans);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .btn:hover { background: var(--glass-strong); border-color: var(--gold); }
  .btn.primary {
    background: var(--gold);
    color: oklch(0.20 0.05 80);
    border-color: var(--gold);
  }
  .btn.primary:hover { background: var(--gold-soft); }
  .btn .arrow { transition: transform .2s; }
  .btn:hover .arrow { transform: translateX(4px); }

  .hero-scroll-hint {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--fg-3);
    text-transform: uppercase;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .hero-scroll-hint .line {
    width: 1px; height: 40px;
    background: linear-gradient(180deg, transparent, var(--fg-2));
    animation: drop 2s ease-in-out infinite;
  }
  @keyframes drop {
    0% { transform: scaleY(0.3); transform-origin: top; opacity: 0.3; }
    50% { transform: scaleY(1); transform-origin: top; opacity: 1; }
    100% { transform: scaleY(0.3); transform-origin: bottom; opacity: 0.3; }
  }

  /* ---------- Section scaffolding ---------- */
  .section {
    position: relative;
    padding: 140px 40px;
    z-index: 3;
  }
  .section-wrap {
    max-width: 1280px;
    margin: 0 auto;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 72px;
    gap: 40px;
    flex-wrap: wrap;
  }
  .section-title {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: clamp(40px, 5vw, 64px);
    line-height: 1;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .section-title em { font-style: italic; color: var(--ice); }
  .section-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: block;
  }
  .section-desc {
    max-width: 420px;
    font-size: 15px;
    line-height: 1.6;
    color: var(--fg-2);
  }

  /* ---------- Competitions ---------- */
  .comp-filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .chip {
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fg-2);
    background: var(--glass);
    border: 1px solid var(--line);
    border-radius: 100px;
    cursor: pointer;
    transition: all .2s;
  }
  .chip:hover { color: var(--fg-0); border-color: var(--line-strong); }
  .chip.active { background: var(--fg-0); color: var(--bg-0); border-color: var(--fg-0); }

  .comp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  .comp-card {
    background: var(--bg-1);
    padding: 32px;
    cursor: pointer;
    transition: background .3s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-height: 260px;
  }
  .comp-card:hover { background: var(--bg-2); }
  .comp-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), oklch(0.85 0.10 230 / 0.08), transparent 50%);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  .comp-card:hover::after { opacity: 1; }
  .comp-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .comp-date {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .comp-status {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1px solid var(--line-strong);
    color: var(--fg-2);
  }
  .comp-status.open { color: var(--ice); border-color: oklch(0.72 0.08 230 / 0.4); }
  .comp-status.closing { color: var(--gold); border-color: oklch(0.82 0.12 80 / 0.5); }
  .comp-name {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 26px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--fg-0);
    margin: 0;
  }
  .comp-meta {
    display: grid;
    grid-template-columns: 66px 1fr;
    column-gap: 12px;
    row-gap: 8px;
    font-size: 13px;
    color: var(--fg-2);
    margin-top: auto;
    align-items: start;
  }
  .comp-meta .row { display: contents; }
  .comp-meta .k {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--fg-3);
    padding-top: 2px;
  }
  .comp-meta .v { color: var(--fg-1); font-weight: 400; line-height: 1.45; }

  /* ---------- Competition detail (modal) ---------- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: oklch(0.05 0.03 var(--hue) / 0.85);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 40px;
    animation: fadeIn .3s ease-out;
  }
  [data-mode="light"] .modal-overlay {
    background: oklch(0.95 0.01 var(--hue) / 0.85);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--line-strong);
    max-width: 980px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp .4s cubic-bezier(.16,.84,.44,1);
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; }}
  .modal-close {
    position: absolute; top: 20px; right: 20px;
    width: 40px; height: 40px;
    background: var(--glass); border: 1px solid var(--line);
    color: var(--fg-1);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    z-index: 2;
    border-radius: 100px;
  }
  .modal-close:hover { background: var(--glass-strong); color: var(--fg-0); }

  .modal-hero {
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .modal-hero::before {
    content: ""; position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, oklch(0.82 0.12 80 / 0.15), transparent 50%),
                radial-gradient(circle at 20% 80%, oklch(0.72 0.08 230 / 0.15), transparent 50%);
    pointer-events: none;
  }
  .modal-hero > * { position: relative; }
  .modal-eyebrow {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex; gap: 12px; align-items: center;
  }
  .modal-title {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: clamp(36px, 4vw, 52px);
    line-height: 1.05;
    margin: 0 0 20px;
    letter-spacing: -0.01em;
  }
  .modal-basics {
    display: flex; flex-wrap: wrap; gap: 28px;
    color: var(--fg-1);
    font-size: 14px;
  }
  .modal-basics .item { display: flex; flex-direction: column; gap: 4px; }
  .modal-basics .label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--fg-3);
  }

  .modal-body {
    display: grid; grid-template-columns: 2fr 1fr;
    gap: 0;
  }
  .modal-main { padding: 40px 48px; border-right: 1px solid var(--line); }
  .modal-side { padding: 40px 40px; background: oklch(0.08 0.03 var(--hue) / 0.5); }
  [data-mode="light"] .modal-side { background: oklch(0.90 0.02 var(--hue) / 0.5); }

  .block { margin-bottom: 44px; }
  .block:last-child { margin-bottom: 0; }
  .block-title {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }

  .schedule-row {
    display: grid; grid-template-columns: 70px 1fr auto;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 14px;
    align-items: baseline;
  }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-time {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ice);
    letter-spacing: 0.04em;
  }
  .schedule-event { color: var(--fg-0); }
  .schedule-event .sub { color: var(--fg-3); font-size: 12px; display: block; margin-top: 2px; }

<!-- Particles + parallax -->
<script>
(() => {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W, H;
  let particles = [];
  let targetCount = (window.__TWEAKS__?.particleDensity ?? 60);

  function resize() {
    W = canvas.width = window.innerWidth * DPR;
    H = canvas.height = window.innerHeight * DPR;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  function makeParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: (Math.random() * 1.2 + 0.3) * DPR,
      vx: (Math.random() - 0.5) * 0.1 * DPR,
      vy: (Math.random() * -0.2 - 0.05) * DPR,
      op: Math.random() * 0.6 + 0.2,
      twinkle: Math.random() * Math.PI * 2,
      gold: Math.random() < 0.25,
    };
  }

  function syncCount() {
    while (particles.length < targetCount) particles.push(makeParticle());
    while (particles.length > targetCount) particles.pop();
  }
  syncCount();
  window.__syncParticles = (n) => { targetCount = n; syncCount(); };

  function tick(t) {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.twinkle += 0.03;
      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      const alpha = p.op * (0.6 + 0.4 * Math.sin(p.twinkle));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.gold
        ? `oklch(0.85 0.12 80 / ${alpha})`
        : `oklch(0.95 0.02 230 / ${alpha})`;
      ctx.shadowBlur = p.r * 4;
      ctx.shadowColor = p.gold ? 'oklch(0.82 0.12 80)' : 'oklch(0.85 0.08 230)';
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // Parallax on hero figure during scroll
  const hero = document.getElementById('heroFigure');
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    const fade = Math.max(0, 1 - y / 800);
    const shift = y * 0.15;
    hero.style.transform = `translate(-50%, calc(-50% - ${shift}px)) scale(${1 - y * 0.0003})`;
    hero.style.opacity = 0.15 + fade * 0.85;
  });
})();
</script>
</body>
</html>
